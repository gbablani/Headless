project:
  name: ""
  description: ""
  overview_path: ./docs/repository_overview.md
documentation:
  output_path: ./docs/
  template: documentation.template.md
  include_diagrams: true
  diagram_syntax: azure-devops
research:
  ado:
    organization: ${ado_organization}
    project: ${ado_project}
  artifacts:
    findings: .octane/research/findings
    synthesis: .octane/research/synthesis
    design: .octane/research/design
    plans: .octane/research/plans
tools:
  code_search: code-search
  ado: ado
  work_iq: work-iq
  enghub: enghub
phases:
  gather:
    required_sources:
      - ado
      - workiq
      - enghub
      - codebase
  synthesize:
    outputs:
      - problem_statement
      - system_context
      - stakeholder_map
      - contracts
      - constraints
      - risks
  design:
    min_options: 2
    max_options: 5
    required_analysis:
      - pros_cons
      - contract_impact
      - alignment_needs
      - effort_estimate
      - rollout_risk
  plan:
    required_sections:
      - alignment_plan
      - implementation_phases
      - testing_strategy
      - rollout_plan
      - success_metrics
planner:
  artifacts:
    requirements: ./docs/projects/
    prd: ./docs/projects/
tester:
  testing_instructions:
    languages:
      dotnet:
        - Use built-in tools to run unit tests and integration tests
        - Use `microsoft_docs_search` tool if additional help is required
  analysis:
    assessments:
      test_coverage:
        - Determine if all critical paths and edge cases are covered
        - Highlight missing scenarios
        - Suggest additional tests to improve coverage
      reliability:
        - Detect any flaky or unstable tests
        - Recommend changes to improve consistency and determinism
      best_practices:
        - Review test structure, naming, and clarity
        - Ensure alignment with recognized testing standards
        - Suggest improvements for maintainability and readability
